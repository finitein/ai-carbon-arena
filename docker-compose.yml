version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: arena-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-arena}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-arena_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-carbon_arena}
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-arena}']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: arena-redis
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    container_name: arena-backend
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3000
      WS_PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-arena}:${POSTGRES_PASSWORD:-arena_dev_password}@postgres:5432/${POSTGRES_DB:-carbon_arena}
      REDIS_URL: redis://redis:6379
      JSONL_LOG_DIR: /data/logs
    ports:
      - '3000:3000'
      - '3001:3001'
    volumes:
      - logs:/data/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: packages/web/Dockerfile
    container_name: arena-frontend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3000/api}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:3001}
    ports:
      - '3002:3000'
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: arena-nginx
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/arena.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend

volumes:
  pgdata:
  logs:
